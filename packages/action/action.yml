name: Crosshair
description: Behavioral regression testing for MCP servers — fail the build on a tool-selection regression.
branding:
  icon: crosshair
  color: red

inputs:
  version:
    description: crosshair version to run (npm dist-tag or exact version).
    required: false
    default: latest
  args:
    description: Extra arguments passed to `crosshair run` (e.g. --strict).
    required: false
    default: ""
  junit:
    description: Path for the JUnit XML report.
    required: false
    default: crosshair-junit.xml
  working-directory:
    description: Directory containing crosshair.config.ts.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - shell: bash
      working-directory: ${{ inputs.working-directory }}
      # ANTHROPIC_API_KEY is intentionally NOT set here — the caller's job supplies
      # it via env, and on fork PRs it is absent by design (see live-eval.yml).
      run: npx -y crosshair@${{ inputs.version }} run --junit "${{ inputs.junit }}" ${{ inputs.args }}